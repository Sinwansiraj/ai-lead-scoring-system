services:
  - type: web
    name: ai-lead-scoring-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free

    envVars:
      - key: PYTHONPATH
        value: /app/src
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: INFO
      # MODEL_PATH defaults to models/lead_scoring_bundle.joblib (relative to /app)
      - key: MODEL_PATH
        value: models/lead_scoring_bundle.joblib

    healthCheckPath: /api/v1/health
